spring:
  application:
    name: virtual-learning-metaverse-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/vlm}
    username: ${DATABASE_USERNAME:vlm}
    password: ${DATABASE_PASSWORD:vlm}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${PORT:8080}

app:
  jwt:
    # Replace in production with a long random base64 secret from a secure secret manager.
    secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret-change-this-dev-secret}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:30}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
